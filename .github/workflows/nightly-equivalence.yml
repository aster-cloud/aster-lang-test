name: Nightly dual-engine equivalence

# P1-9: 每日跑 tier1 + tier2 parse-equivalence over both TS and Java engines.
# Detects regressions (rate dropping) and tracks trend over time.

on:
  schedule:
    - cron: '0 2 * * *'   # UTC 02:00 daily
  workflow_dispatch:

permissions:
  contents: write   # 用于把 equivalence-history.csv push 回仓库

jobs:
  equivalence:
    runs-on: ubuntu-latest
    steps:
      # R21 (audit): CROSS_REPO_TOKEN was never set in repo secrets, causing
      # `Input required and not supplied: token` and a 6s failure every
      # night since 2026-05-13. Self-checkout uses ${{ github.token }}
      # (always available); sibling checkouts use CROSS_REPO_TOKEN when
      # present, falling back to GITHUB_TOKEN (works because all sibling
      # repos are in the same `aster-cloud` org).
      - uses: actions/checkout@v6
        with:
          path: aster-lang-test
          # default token is fine for self-repo

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-ts
          path: aster-lang-ts
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # 共享版本目录（aster-lang-platform，ADR 0012）。aster-lang-core 的
      # settings.gradle 经 asterLibs.* 引用它，core 的任何 gradle 调用前必须
      # 先把它发到 Maven Local，否则解析 cloud.aster-lang:aster-lang-platform 失败。
      - uses: actions/checkout@v6
        with: { repository: aster-cloud/aster-lang-platform, path: aster-lang-platform, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }

      # aster-lang-core 需要 sibling lexicon 仓库
      - uses: actions/checkout@v6
        with: { repository: aster-cloud/aster-lang-en, path: aster-lang-en, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }
      - uses: actions/checkout@v6
        with: { repository: aster-cloud/aster-lang-zh, path: aster-lang-zh, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }
      - uses: actions/checkout@v6
        with: { repository: aster-cloud/aster-lang-de, path: aster-lang-de, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: aster-lang-ts/pnpm-lock.yaml

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build aster-lang-ts
        working-directory: aster-lang-ts
        run: pnpm install --frozen-lockfile && pnpm build

      # harness 的 runJavaParse 跑 aster-lang-core 的 TsSampleParseInventoryTest，
      # 该测试经 asterLibs.* 依赖共享版本目录 + locale 包，并经 CorpusLoader 依赖
      # corpus。core 的任何 gradle 调用前，这些都必须先发到 Maven Local（顺序：
      # platform → core → en/zh/de → corpus），与 ci.yml 的 publish 链一致。
      # 缺失会导致 "Could not find cloud.aster-lang:aster-lang-platform" 而整个
      # nightly 失败（等价率 CSV 因此长期停更）。
      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal
      - name: Publish aster-lang-core to Maven Local
        working-directory: aster-lang-core
        run: ./gradlew compileJava publishToMavenLocal -x test
      - name: Publish locale packs to Maven Local
        run: |
          cd aster-lang-en && ./gradlew publishToMavenLocal -x test
          cd ../aster-lang-zh && ./gradlew publishToMavenLocal -x test
          cd ../aster-lang-de && ./gradlew publishToMavenLocal -x test
      - name: Publish corpus to Maven Local
        working-directory: aster-lang-test/packages/jvm
        run: ./gradlew publishToMavenLocal -x test

      - name: Run equivalence harness
        working-directory: aster-lang-test
        run: node scripts/equivalence-nightly.mjs | tee equivalence-report.md

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: equivalence-${{ github.run_id }}
          path: |
            aster-lang-test/equivalence-report.json
            aster-lang-test/equivalence-report.md
            aster-lang-test/equivalence-history.csv

      # cron（每日）和手动 dispatch 都提交：dispatch 让运维能即时刷新
      # aster-lang.cloud/*/equivalence 页面（等价率变化后无需等到次日 02:00）。
      # git diff --quiet 去重，等价率未变则不产生空提交。
      - name: Append history to main
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && success()
        working-directory: aster-lang-test
        env:
          GIT_AUTHOR_NAME: aster-bot
          GIT_AUTHOR_EMAIL: bot@aster-lang.cloud
          GIT_COMMITTER_NAME: aster-bot
          GIT_COMMITTER_EMAIL: bot@aster-lang.cloud
        run: |
          if git diff --quiet equivalence-history.csv; then
            echo "history unchanged, nothing to commit"
            exit 0
          fi
          git add equivalence-history.csv
          git commit -m "chore: append equivalence rate $(tail -1 equivalence-history.csv | cut -d, -f5) (${{ github.event_name }})"
          git push

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\":warning: nightly equivalence regressed (run ${{ github.run_id }}). See artefacts.\"}" \
            "$SLACK_WEBHOOK"
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_PERF_WEBHOOK }}
