name: Nightly dual-engine equivalence

# P1-9: 每日跑 tier1 + tier2 parse-equivalence over both TS and Java engines.
# Detects regressions (rate dropping) and tracks trend over time.

on:
  schedule:
    - cron: '0 2 * * *'   # UTC 02:00 daily
  workflow_dispatch:

permissions:
  contents: write   # 用于把 equivalence-history.csv push 回仓库

jobs:
  equivalence:
    runs-on: ubuntu-latest
    steps:
      # R21 (audit): CROSS_REPO_TOKEN was never set in repo secrets, causing
      # `Input required and not supplied: token` and a 6s failure every
      # night since 2026-05-13. Self-checkout uses ${{ github.token }}
      # (always available); sibling checkouts use CROSS_REPO_TOKEN when
      # present, falling back to GITHUB_TOKEN (works because all sibling
      # repos are in the same `aster-cloud` org).
      - uses: actions/checkout@v6
        with:
          path: aster-lang-test
          # default token is fine for self-repo

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-ts
          path: aster-lang-ts
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # 共享版本目录（aster-lang-platform，ADR 0012）。aster-lang-core 的
      # settings.gradle 经 asterLibs.* 引用它，core 的任何 gradle 调用前必须
      # 先把它发到 Maven Local，否则解析 cloud.aster-lang:aster-lang-platform 失败。
      - uses: actions/checkout@v6
        with: { repository: aster-cloud/aster-lang-platform, path: aster-lang-platform, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }

      # 语言包源：aster-lang-locales（现役，catalog 驱动，asterLang 版本统一）。
      # 旧的独立 aster-lang-{en,zh,de} 仓已按 ADR-0011 归档（version 冻结在 1.0.2、
      # 不再发布），而 core main 06-19 已 bump 到 1.0.3。继续 checkout 归档仓会
      # 解析 cloud.aster-lang:aster-lang-core:1.0.2 失败（漂移）。与 ci.yml 一致从
      # aster-lang-locales 一次性发 en/zh/de（同坐标，版本永远跟随 platform catalog）。
      # locales 的 verifyLexiconParity 需 aster-lang-core 在 ../aster-lang-core（sibling），
      # 上面已 checkout 到该路径。
      - uses: actions/checkout@v6
        with: { repository: aster-cloud/aster-lang-locales, path: aster-lang-locales, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }

      # Hindi(hi-IN) 是独立的热插拔 SPI 包（aster-lang-hi 仓，非 locales 的一部分）。
      # platform catalog 的 asterLibs.bundles.locales = en+zh+de+hi，Truffle 经
      # runtimeOnly(bundles.locales) 依赖 aster-lang-hi:1.0.3。不发布它会让 Phase C
      # 的 CoreIrEvalCli 解析 aster-lang-hi 失败、eval-parity 的 Java 侧无输出
      # （此前因该 step 缺 pipefail 被 tee 静默掩盖成 success）。
      - uses: actions/checkout@v6
        with: { repository: aster-cloud/aster-lang-hi, path: aster-lang-hi, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }

      # Phase C eval-parity 需要 Truffle 求值器（CoreIrEvalCli 在 truffle 仓），
      # truffle 经 Maven Local 依赖 core + runtime。
      - uses: actions/checkout@v6
        with: { repository: aster-cloud/aster-lang-runtime, path: aster-lang-runtime, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }
      - uses: actions/checkout@v6
        with: { repository: aster-cloud/aster-lang-truffle, path: aster-lang-truffle, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: aster-lang-ts/pnpm-lock.yaml

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build aster-lang-ts
        working-directory: aster-lang-ts
        run: pnpm install --frozen-lockfile && pnpm build

      # harness 的 runJavaParse 跑 aster-lang-core 的 TsSampleParseInventoryTest，
      # 该测试经 asterLibs.* 依赖共享版本目录 + locale 包，并经 CorpusLoader 依赖
      # corpus。core 的任何 gradle 调用前，这些都必须先发到 Maven Local（顺序：
      # platform → core → locales(en/zh/de) → corpus），与 ci.yml 的 publish 链一致。
      # 缺失会导致 "Could not find cloud.aster-lang:aster-lang-platform" 而整个
      # nightly 失败（等价率 CSV 因此长期停更）。
      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal
      - name: Publish aster-lang-core to Maven Local
        working-directory: aster-lang-core
        run: ./gradlew compileJava publishToMavenLocal -x test
      # 语言包从 aster-lang-locales（catalog 驱动）一次性发布 en/zh/de（同坐标，
      # 版本跟随 platform catalog asterLang=1.0.3）。与 ci.yml 的 publish 链一致。
      - name: Publish locale packs to Maven Local
        working-directory: aster-lang-locales
        run: ./gradlew publishToMavenLocal -x test
      # Hindi(hi-IN) 独立 SPI 包，Truffle 的 bundles.locales 依赖它（见上方 checkout
      # 注释）。须在 core 之后发（hi 依赖 core 1.0.3）。
      - name: Publish aster-lang-hi to Maven Local
        working-directory: aster-lang-hi
        run: ./gradlew publishToMavenLocal -x test
      - name: Publish corpus to Maven Local
        working-directory: aster-lang-test/packages/jvm
        run: ./gradlew publishToMavenLocal -x test
      # runtime 供 truffle 依赖（eval-parity 的 CoreIrEvalCli）
      - name: Publish aster-lang-runtime to Maven Local
        working-directory: aster-lang-runtime
        run: ./gradlew publishToMavenLocal -x test

      # Phase A：parse-equivalence 趋势（equivalence-history.csv）。
      # 必须 `set -o pipefail`，否则等价率回归时 equivalence-nightly.mjs 的
      # process.exit(1) 会被管道末端的 tee（退出码 0）吞掉 → 本 step 误判 success
      # → 后续 "Append history to main"（if: success()）把下跌后的 CSV/report/
      # manifest 提交进 main，污染下一轮的回归基线。与 ci.yml 的 parity step 一致。
      - name: Run parse-equivalence harness
        working-directory: aster-lang-test
        shell: bash
        run: |
          set -o pipefail
          node scripts/equivalence-nightly.mjs | tee equivalence-report.md

      # #30: after regenerating equivalence-report.json + appending the history
      # row, hold the freshly-written snapshot to exact-match-latest. The nightly
      # is the one place that can legitimately produce the latest report, so it
      # gates with --require-fresh (CI PR gate only runs the always-on checks).
      - name: Verify equivalence-report freshness
        working-directory: aster-lang-test
        run: node scripts/check-equivalence-freshness.mjs --require-fresh

      # Phase C：eval-parity 趋势（eval-history.csv）。--history 追加一行
      # timestamp,total,identical,divergent,rate。report-only 不让分歧让 nightly 失败
      # （趋势记录优先），真实 PR-blocking 在 aster-lang-test/aster-lang-core CI。
      # report-only 不让 parity 分歧让 nightly 失败，但仍须 pipefail：node 进程
      # 崩溃（非分歧）的非零退出不应被管道末端的 tee 掩盖成 success。
      - name: Run eval-parity harness
        working-directory: aster-lang-test
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=eval --report-only --history=eval-history.csv | tee eval-parity-report.md

      # eval 覆盖率趋势（covered / eval-able），供 equivalence 走势图。
      - name: Record eval-coverage history
        working-directory: aster-lang-test
        run: node scripts/tag-eval-exempt.mjs --history=eval-coverage-history.csv >/dev/null

      # Feature-coverage map：哪些语言特性被语料实际执行（dual-engine），
      # 哪些只解析不执行（盲点）。纯文本扫描，无需引擎，report-only。
      - name: Run feature-coverage instrument
        working-directory: aster-lang-test
        shell: bash
        run: |
          set -o pipefail
          node scripts/feature-coverage.mjs --history=feature-coverage-history.csv | tee feature-coverage-report.md

      # ADR 0016：字段级 Core IR parity（归一化后逐字段比对两引擎 IR）。
      # report-only，盲点记入 IR-DIVERGENCE-LEDGER.md。复用上面已发布的 core。
      # --history 记 IR 字段级一致率趋势（供走势图）。
      - name: Run field-level IR parity
        working-directory: aster-lang-test
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=ir --full --report-only --history=ir-history.csv | tee ir-field-parity-report.md

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: equivalence-${{ github.run_id }}
          path: |
            aster-lang-test/equivalence-report.json
            aster-lang-test/equivalence-report.md
            aster-lang-test/equivalence-history.csv
            aster-lang-test/eval-parity-report.md
            aster-lang-test/eval-history.csv
            aster-lang-test/feature-coverage-report.md
            aster-lang-test/ir-field-parity-report.md
            aster-lang-test/ir-history.csv
            aster-lang-test/eval-coverage-history.csv
            aster-lang-test/feature-coverage-history.csv

      # cron（每日）和手动 dispatch 都提交：dispatch 让运维能即时刷新
      # aster-lang.cloud/*/equivalence 页面（等价率变化后无需等到次日 02:00）。
      # git diff --quiet 去重，等价率未变则不产生空提交。
      - name: Append history to main
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && success()
        working-directory: aster-lang-test
        env:
          GIT_AUTHOR_NAME: aster-bot
          GIT_AUTHOR_EMAIL: bot@aster-lang.cloud
          GIT_COMMITTER_NAME: aster-bot
          GIT_COMMITTER_EMAIL: bot@aster-lang.cloud
        run: |
          # #30: also commit the regenerated equivalence-report.json so the
          # committed snapshot tracks the latest nightly (its summary.basedOnHistory
          # points at the row appended this run). Keeps the report from going stale
          # relative to the CSV, which is exactly what the freshness guard enforces.
          # Phase A 同时把 corpus/tier1-parity/manifest.json 的 basedOnEquivalence
          # 同步到本次 report，须一并提交，否则 manifest 每夜被重生却永不持久化，
          # 次夜 --require-fresh 的 Check 4 仍会拿陈旧的提交值失配。
          HIST_FILES="equivalence-history.csv eval-history.csv ir-history.csv eval-coverage-history.csv feature-coverage-history.csv equivalence-report.json corpus/tier1-parity/manifest.json"
          if git diff --quiet $HIST_FILES; then
            echo "history unchanged, nothing to commit"
            exit 0
          fi
          git add $HIST_FILES
          parse_rate=$(tail -1 equivalence-history.csv | cut -d, -f5)
          eval_rate=$(tail -1 eval-history.csv | cut -d, -f5)
          ir_rate=$(tail -1 ir-history.csv | cut -d, -f5)
          git commit -m "chore: append parity rates parse=$parse_rate eval=$eval_rate ir=$ir_rate (${{ github.event_name }})"
          git push

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\":warning: nightly equivalence regressed (run ${{ github.run_id }}). See artefacts.\"}" \
            "$SLACK_WEBHOOK"
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_PERF_WEBHOOK }}
