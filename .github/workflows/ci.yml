name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 ref 上新 push 到来时取消尚在跑的过时 CI（PR 连续 push 常见）——省算力/排队。
# ★cancel-in-progress 只对 PR 生效（Codex 审 High）：本仓 CI 的 notify-consumers job 在
# main push + corpus 变更时会 repository_dispatch 到 aster-lang-ts/core 触发下游 regression
# ——属跨仓副作用。若 main push A（改 corpus）被后续 push B（未改 corpus）取消，则 A 的
# consumer dispatch 丢失、B 的 paths-filter 又不触发 → regression 漏跑。故 main run 不取消。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-js:
    name: Build & test (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v6
      # 防漂移 gate（ADR 0023 阶段6）：校验 test:npm（packages/js）版本符合 release-plan.json。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: Release-plan drift gate
        working-directory: ${{ github.workspace }}
        run: |
          python3 aster-lang-platform/scripts/release-plan/check-artifact.py \
            --plan aster-lang-platform/release-plan.json \
            --artifact test:npm --repo-root .
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: packages/js/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      # #30: guard the equivalence parity artifacts against silent staleness.
      # Blocking (checks 1–4): fails if equivalence-report.json is internally
      # inconsistent, cites totals that match no real equivalence-history.csv
      # row (hand-edited), or disagrees with corpus/tier1-parity/manifest.json.
      # Calendar freshness vs the latest nightly is OFF here by design (the
      # report is a dated snapshot regenerated only by the nightly job, which
      # runs this script with --require-fresh).
      - name: Guard equivalence-report freshness
        run: pnpm run check:equivalence-freshness

  build-jvm:
    name: Build & test (JDK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/jvm
    steps:
      - uses: actions/checkout@v6
      # 防漂移 gate（ADR 0023 阶段6）：校验 test:jvm（packages/jvm）版本符合 release-plan.json。
      # gate step 覆盖 job 的默认 working-directory，回到 repo root。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: Release-plan drift gate
        working-directory: ${{ github.workspace }}
        run: |
          python3 aster-lang-platform/scripts/release-plan/check-artifact.py \
            --plan aster-lang-platform/release-plan.json \
            --artifact test:jvm --repo-root .
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v6
      # catalog bootstrap（ADR 0023 §9）：packages/jvm version=catalog-derived，settings 从
      # mavenLocal 解析 catalog → 须先把已 checkout 的 platform publishToMavenLocal。
      - name: Bootstrap version catalog to Maven Local
        working-directory: ${{ github.workspace }}/aster-lang-platform
        run: ./gradlew publishToMavenLocal
      - run: ./gradlew test

  # Cross-engine inventory gate is enforced on the consumer side:
  #   - aster-lang-ts CI runs `node scripts/java-corpus-parse-inventory.mjs`
  #   - aster-lang-core CI runs `./gradlew test --tests TsSampleParseInventoryTest`
  #
  # Running the full inventory here would require sibling checkouts plus a
  # full Java + TS build, coupling this repo's PR latency to both engines.
  # The tier1-parity job below is the targeted exception — it only runs the
  # strict bidirectional contract over the curated subset in
  # `corpus/tier1-parity/manifest.json`. It is the SOURCE OF TRUTH for "what
  # both engines must accept" and is PR-blocking when anything in
  # corpus/tier1-* or the manifest itself changes. tier2-divergent and the
  # broader equivalence rate remain on the nightly job.
  parity-tier1:
    name: Strict tier1 parity — parse (TS ↔ Java)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # R-CI-1 fix: dorny/paths-filter@v4 requires a git checkout in the
      # working directory; we previously ran it as the first step and it
      # failed with `not a git repository`. Self-checkout into a sub-path
      # FIRST, then run paths-filter pointing at that working directory
      # so it can diff the PR base against HEAD.
      - name: Self checkout
        uses: actions/checkout@v6
        with:
          path: aster-lang-test
          fetch-depth: 0

      - name: Decide whether to run
        id: changed
        uses: dorny/paths-filter@v4
        with:
          working-directory: aster-lang-test
          filters: |
            parity:
              - 'corpus/tier1-equivalence/**'
              - 'corpus/tier1-parity/**'
              - 'scripts/parity-tier1.mjs'
              - 'scripts/equivalence-nightly.mjs'
              - '.github/workflows/ci.yml'

      # Shared version catalog (aster-lang-platform, ADR 0012). aster-lang-core
      # 的 settings.gradle 通过 asterLibs.* 引用它，故 publish core 前必须先把
      # 它发到 Maven Local，否则解析 cloud.aster-lang:aster-lang-platform 失败。
      # 兄弟仓 checkout 走分支匹配（self checkout 进了 aster-lang-test/ 子目录，
      # 故复合 action 路径带前缀 ./aster-lang-test/...）。匹配同名 PR 分支，
      # 否则回退 main —— 让跨仓 PR 合并前即可联合验证。
      - name: Checkout aster-lang-platform
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: ./aster-lang-test/.github/actions/checkout-sibling
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout aster-lang-ts
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: ./aster-lang-test/.github/actions/checkout-sibling
        with:
          repository: aster-cloud/aster-lang-ts
          path: aster-lang-ts
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout aster-lang-core
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: ./aster-lang-test/.github/actions/checkout-sibling
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # Lang packs are required for aster-lang-core's SPI-driven tests.
      # 语言包源：aster-lang-locales（现役，catalog 驱动，asterLang 版本统一）。
      # 旧独立 en/zh/de 仓已归档且 pin core 1.0.2，与 catalog 1.0.3 漂移——
      # 与 aster-lang-core ci.yml 一致迁移到 aster-lang-locales。
      - name: Checkout aster-lang-locales
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: ./aster-lang-test/.github/actions/checkout-sibling
        with:
          repository: aster-cloud/aster-lang-locales
          path: aster-lang-locales
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # aster-lang-runtime + aster-lang-truffle are only needed by the
      # Phase C evaluator step (CoreIrEvalCli lives in truffle). They
      # depend on aster-lang-core via Maven Local — see the publish
      # chain further down.
      - name: Checkout aster-lang-runtime
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: ./aster-lang-test/.github/actions/checkout-sibling
        with:
          repository: aster-cloud/aster-lang-runtime
          path: aster-lang-runtime
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      - name: Checkout aster-lang-truffle
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: ./aster-lang-test/.github/actions/checkout-sibling
        with:
          repository: aster-cloud/aster-lang-truffle
          path: aster-lang-truffle
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Setup pnpm
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: aster-lang-ts/pnpm-lock.yaml

      - name: Setup Java
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build aster-lang-ts
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-ts
        run: pnpm install --frozen-lockfile && pnpm build

      # The Java side of the gate runs aster-lang-core's gradle test,
      # which resolves these from Maven Local:
      #   - cloud.aster-lang:aster-lang-core (core itself)
      #   - cloud.aster-lang:aster-lang-{en,zh,de} (SPI locale packs)
      #   - cloud.aster-lang:aster-lang-test (the corpus this PR is testing)
      # If we don't publish them locally first, gradle falls back to
      # GitHub Packages and fails with 401 in PR forks / when the runner
      # token lacks read scope on private repos.
      #
      # Order matters: locale packs depend on core, so core goes first.
      # 但 core 自身经 asterLibs.* 依赖共享版本目录（aster-lang-platform，
      # ADR 0012），core 的任何 gradle 调用前必须先把版本目录发到 Maven Local。
      - name: Publish version catalog to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal

      - name: Publish aster-lang-core to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-core
        run: ./gradlew compileJava publishToMavenLocal -x test

      # 语言包从 aster-lang-locales（catalog 驱动）一次性发布。locales 的
      # verifyLexiconParity 需 aster-lang-core 在 ../aster-lang-core（sibling）；
      # 本 workspace 已 checkout 到 aster-lang-core 路径，无需额外软链。
      - name: Publish locale packs to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        run: |
          cd aster-lang-locales && ./gradlew publishToMavenLocal -x test

      - name: Publish aster-lang-runtime to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-runtime
        run: ./gradlew publishToMavenLocal -x test

      - name: Publish corpus to Maven Local
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test/packages/jvm
        run: ./gradlew publishToMavenLocal -x test

      - name: Run tier1-parity strict gate (parse, PR-blocking)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test
        # `set -o pipefail` so a runner exit != 0 propagates through `tee`.
        # Without it, tee's success masks runner failures and the gate
        # silently passes when gradle blows up.
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=parse | tee parity-tier1-parse-report.md

      # Phase B (codex architect plan): structural Core IR fingerprint
      # parity. Runs after the parse gate using the same Maven Local
      # state the parse gate already built.
      #
      # ADR 0016 phase 3: now PR-blocking at the FIELD level. After the
      # normalizing comparator (normalizeIr/diffIr) and the eval-exempt
      # boundary, the non-exempt corpus is field-identical (202/207; the 5
      # remaining are effect/workflow/interop derived-analysis differences,
      # reported as `divergent-exempt`, not failures). A new structural
      # divergence in an executable-tree node now fails the gate.
      - name: Run tier1-parity strict gate (IR field-level, PR-blocking)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=ir --full | tee parity-tier1-ir-report.md

      # Phase C: evaluator output parity for samples with .cases.json.
      # Operates on a smaller subset (15 samples / ~45 cases as of this
      # landing) and exercises Truffle Context.eval → Value.execute().
      # Report-only because the initial run surfaces a systemic NPE on
      # multi-argument Truffle invocations that has to be fixed
      # upstream before this can be PR-blocking.
      - name: Run tier1-parity (eval, report-only)
        if: steps.changed.outputs.parity == 'true' || github.event_name == 'push'
        working-directory: aster-lang-test
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/parity-tier1.mjs --mode=eval --report-only | tee parity-tier1-eval-report.md

      - name: Upload parity reports
        if: always() && (steps.changed.outputs.parity == 'true' || github.event_name == 'push')
        uses: actions/upload-artifact@v7
        with:
          name: parity-tier1-${{ github.run_id }}
          path: |
            aster-lang-test/parity-tier1-report.json
            aster-lang-test/parity-tier1-parse-report.md
            aster-lang-test/parity-tier1-ir-report.md
            aster-lang-test/parity-tier1-eval-report.md
          if-no-files-found: warn

  # P0-5: corpus 改动 → 主动触发两个 consumer 的 corpus-regression workflow。
  # CROSS_REPO_TOKEN: GH PAT with repo scope (创建于 github.com/settings/tokens).
  notify-consumers:
    name: Trigger consumer regression
    needs: [build-js, build-jvm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # R-CI-1 fix: paths-filter requires a checkout to diff against.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if corpus changed
        id: changed
        uses: dorny/paths-filter@v4
        with:
          filters: |
            corpus:
              - 'corpus/**'
              - 'packages/js/src/loader.ts'
              - 'packages/jvm/src/main/java/cloud/aster/test/CorpusLoader.java'

      - name: Dispatch to aster-lang-ts
        if: steps.changed.outputs.corpus == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: aster-cloud/aster-lang-ts
          event-type: corpus-changed
          client-payload: '{"sha":"${{ github.sha }}","ref":"${{ github.ref }}"}'

      - name: Dispatch to aster-lang-core
        if: steps.changed.outputs.corpus == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: aster-cloud/aster-lang-core
          event-type: corpus-changed
          client-payload: '{"sha":"${{ github.sha }}","ref":"${{ github.ref }}"}'
