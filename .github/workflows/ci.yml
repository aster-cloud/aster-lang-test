name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-js:
    name: Build & test (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: packages/js/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  build-jvm:
    name: Build & test (JDK)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/jvm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew test

  inventory:
    name: Cross-engine inventory gate
    runs-on: ubuntu-latest
    needs: [build-js, build-jvm]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '25' }
      - name: Run TS-side inventory
        run: node scripts/inventory.mjs --parser=ts --gate=tier1
      - name: Run Java-side inventory
        run: node scripts/inventory.mjs --parser=java --gate=tier1
