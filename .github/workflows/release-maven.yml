name: Release Maven (GitHub Packages)

on:
  push:
    tags:
      - 'v*'
  # orchestrator（aster-lang-platform/release-train.yml）入口：dispatch 只创建并 push
  # tag（用 CROSS_REPO_TOKEN/PAT，GITHUB_TOKEN 推的 tag 不会再触发 workflow）。真正
  # publish 仍只走下面的 tag-push 路径。本仓双制品（packages/jvm Maven / packages/js
  # npm 版本独立），release-maven.yml 与 release-npm.yml 各自「同文件双触发」：dispatch
  # 创建自己版本的 tag、tag-push 走自己的 publish；非目标 artifact 的 publish 在
  # skip-on-mismatch gate 跳过。orchestrator 的 wait_publish_run 只查本 workflow 的
  # push run，旁路触发的另一 workflow（skip）不影响判定。详见 ADR 0023 阶段2/§9 复盘。
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的 JVM corpus 版本（不含 v 前缀），须等于 packages/jvm/build.gradle.kts 的 version'
        required: true
        type: string
      artifactIds:
        description: 'release-plan 的 artifact id 列表（逗号分隔，审计用，如 test:jvm）'
        required: false
        type: string
      trainId:
        description: 'release train 标识（审计用）'
        required: false
        type: string

# dispatch(vX) 与 tag-push(vX) 同 concurrency group（inputs.version 补 v 前缀对齐
# ref_name），串行化同版本的 create-tag 与 publish；cancel-in-progress:false 避免
# 与同版本另一 trigger 互相取消。group 含 workflow 名，避免与 release-npm.yml 争用。
concurrency:
  group: release-maven-${{ github.repository }}-${{ inputs.version && format('v{0}', inputs.version) || github.ref_name }}
  cancel-in-progress: false

jobs:
  # dispatch 路径：仅创建 tag（用 PAT），让既有 tag-push publish 复用。
  create-tag:
    # 仅允许从默认分支 dispatch，避免给某个 version 恰好匹配的 feature 分支 HEAD 打 release tag。
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          fetch-depth: 0
      # catalog-derived version（ADR 0023 §9）：packages/jvm version=findVersion("asterLang")，
      # 不再 sed 字面量。先 checkout platform 并 publishToMavenLocal，packages/jvm 的 Gradle
      # 才能解析 catalog 派生的 project version。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-java@v5
        with: { java-version: '25', distribution: 'temurin' }
      - name: Bootstrap version catalog to Maven Local
        run: cd aster-lang-platform && ./gradlew publishToMavenLocal
      - name: Create & push release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          RESOLVED=$(cd packages/jvm && ./gradlew -q properties | sed -n 's/^version: //p' | head -n1)
          if [ "$VERSION" != "$RESOLVED" ]; then
            echo "::error::dispatch version ($VERSION) != Gradle-resolved catalog version ($RESOLVED)"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          TAG="v${VERSION}"
          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            TAG_SHA=$(git rev-list -n1 "$TAG"); HEAD_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "::notice::$TAG already on this commit → no-op (idempotent)"; exit 0
            fi
            echo "::error::$TAG exists but points to $TAG_SHA, not HEAD $HEAD_SHA"; exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

  publish:
    # tag-push 路径（含 orchestrator create-tag 推的 tag）才真正发布。
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      # 共享版本目录（ADR 0012/0023 §9）：packages/jvm version=catalog-derived，须先把
      # platform publishToMavenLocal 才能用 Gradle 解析 corpus 版本（skip-on-mismatch gate
      # 也要解析，故 bootstrap 必须在 gate 之前——即使本 tag 是给 npm 的会 skip）。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v6
      - name: Bootstrap version catalog to Maven Local
        run: cd aster-lang-platform && ./gradlew publishToMavenLocal
      # 本仓双制品：JVM(packages/jvm) 与 npm(packages/js) 版本独立（如 jvm 1.0.6 /
      # npm 1.0.3），但两个 release workflow 都监听 v*。推 v1.0.6 会同时触发本
      # workflow 和 release-npm.yml——若 tag 版本不等于本 artifact 版本，**skip 而非
      # fail**（否则非目标 workflow 永远红）。version 已是 catalog-derived，故用 Gradle 解析
      # 而非 sed 字面量；bootstrap 已在前完成，skip 路径也能解析。
      - name: Resolve publish gate (tag == this artifact's version?)
        id: gate
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(cd packages/jvm && ./gradlew -q properties | sed -n 's/^version: //p' | head -n1)
          if [ "$TAG_VERSION" = "$PKG_VERSION" ]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
            echo "tag v$TAG_VERSION matches JVM package version $PKG_VERSION → publish"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tag v$TAG_VERSION != JVM package version $PKG_VERSION → skip Maven publish (this tag is for another artifact)"
          fi
      - if: steps.gate.outputs.match == 'true'
        working-directory: packages/jvm
        run: ./gradlew publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
