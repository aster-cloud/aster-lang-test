# 专用 create-tag 入口（ADR 0023 阶段2）。
#
# 本仓双制品（packages/jvm Maven 1.0.4 + packages/js npm 1.0.2，版本独立），两个
# release workflow (release-maven.yml / release-npm.yml) 都监听 v* 且 skip-on-mismatch。
# orchestrator 按 artifact dispatch 本 workflow 推对应 tag（v1.0.4 触发 maven 发布、
# npm skip；v1.0.2 触发 npm 发布、maven skip）。create-tag 单入口放这里，**不**散在
# 两个 publish workflow 里（否则双 create-tag 会冲突）。用 CROSS_REPO_TOKEN/PAT 推 tag
# 才能再触发 tag-push 发布（GITHUB_TOKEN 推的 tag 不触发 workflow）。
name: Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要打的版本（不含 v）。须等于目标 artifact 的版本：jvm→packages/jvm build.gradle.kts；npm→packages/js package.json'
        required: true
        type: string
      artifactIds:
        description: 'release-plan artifact id（如 test:jvm 或 test:npm，审计用）'
        required: false
        type: string
      trainId:
        required: false
        type: string

concurrency:
  group: release-${{ github.repository }}-v${{ inputs.version }}
  cancel-in-progress: false

jobs:
  create-tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          fetch-depth: 0
      - name: Verify version matches at least one artifact & create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          JVM_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' packages/jvm/build.gradle.kts | head -n1)
          NPM_VERSION=$(node -p "require('./packages/js/package.json').version")
          IDS="${{ inputs.artifactIds }}"
          # 若 orchestrator 传了 artifactIds（意图），按意图收紧：test:jvm 须 version==JVM，
          # test:npm 须 version==npm。防 orchestrator 传错 artifact 派发出无效 tag。
          if printf '%s' "$IDS" | grep -q 'test:jvm'; then
            [ "$VERSION" = "$JVM_VERSION" ] || { echo "::error::artifactIds 含 test:jvm 但 version ($VERSION) != JVM ($JVM_VERSION)"; exit 1; }
          elif printf '%s' "$IDS" | grep -q 'test:npm'; then
            [ "$VERSION" = "$NPM_VERSION" ] || { echo "::error::artifactIds 含 test:npm 但 version ($VERSION) != npm ($NPM_VERSION)"; exit 1; }
          else
            # artifactIds 为空（手工触发）：宽松——version 须等于两 artifact 之一（否则空 tag）。
            if [ "$VERSION" != "$JVM_VERSION" ] && [ "$VERSION" != "$NPM_VERSION" ]; then
              echo "::error::version ($VERSION) 不等于 JVM ($JVM_VERSION) 也不等于 npm ($NPM_VERSION)；该 tag 不会发布任何制品"
              exit 1
            fi
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          TAG="v${VERSION}"
          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            TAG_SHA=$(git rev-list -n1 "$TAG"); HEAD_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "::notice::$TAG already on this commit → no-op (idempotent)"; exit 0
            fi
            echo "::error::$TAG exists but points to $TAG_SHA, not HEAD $HEAD_SHA"; exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"
